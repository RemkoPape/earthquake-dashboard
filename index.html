<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Dashboards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0b1117;
      color: #f5f7fa;
      display: grid;
      place-items: center;
    }

    main {
      width: min(900px, calc(100vw - 32px));
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #c7d0da;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    a.card {
      display: block;
      padding: 20px;
      border-radius: 18px;
      text-decoration: none;
      color: #f5f7fa;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    a.card:hover {
      background: rgba(255, 255, 255, 0.13);
    }

    .card strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .card span {
      color: #c7d0da;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main>
    <h1>Dashboards</h1>
    <p>
      A small collection of live geoscience maps and monitoring dashboards.
    </p>

    <section class="grid">
      <a class="card" href="./Earthquakes/">
        <strong>Live Earthquakes</strong>
        <span>Global significant and high-magnitude earthquake monitoring.</span>
      </a>

      <a class="card" href="./Volcanoes/">
        <strong>Volcanoes</strong>
        <span>Placeholder for future volcanic activity dashboard.</span>
      </a>

      <a class="card" href="./Weather/">
        <strong>Weather</strong>
        <span>Placeholder for future weather or climate monitoring.</span>
      </a>
    </section>
  </main>
</body>
</html>
